
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- SHAKA PLAYER -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#1a0f2e,#05070a);
  font-family:'Poppins',sans-serif;
  color:#fff;
}

.header{
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:#ff4ecd;
  text-shadow:0 0 12px #ff4ecd;
}

.player-card{
  width:92%;
  margin:10px auto;
  padding:10px;
  border-radius:20px;
  background:linear-gradient(145deg,#2a1740,#140b24);
  box-shadow:0 0 25px rgba(255,0,150,0.2);
}

.video{
  width:100%;
  height:220px;
  border-radius:16px;
  overflow:hidden;
  border:2px solid rgba(255,0,150,0.4);
}

.shaka-video-container{
  width:100%;
  height:100%;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* LIVE */
.live-box{
  margin:12px auto;
  width:90px;
  text-align:center;
  padding:6px;
  border-radius:20px;
  background:rgba(255,0,0,0.15);
  border:1px solid red;
  font-size:12px;
  color:red;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

.match-title{
  text-align:center;
  font-size:20px;
  font-weight:600;
}

/* AD */
.ad-box{
  width:92%;
  margin:20px auto;
  padding:8px;
  border-radius:22px;
  background:linear-gradient(135deg,#ff512f,#dd2476);
  box-shadow:0 0 30px rgba(255,80,120,0.5);
}

.ad-box img{
  width:100%;
  height:150px;
  border-radius:18px;
  object-fit:cover;
}

/* INFO */
.info-card{
  width:92%;
  margin:12px auto;
  padding:15px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

.label{
  font-size:12px;
  color:#aaa;
}

.value{
  font-size:16px;
  font-weight:600;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="header">TATA IPL 2026</div>

<div class="player-card">
  <div class="video">
    <div class="shaka-video-container" data-shaka-player>
      <video id="video" autoplay muted playsinline></video>
    </div>
  </div>
</div>

<div class="live-box">● LIVE</div>
<div class="match-title">RCB vs SRH</div>

<!-- AD -->
<div class="ad-box">
  <a href="https://wa.me/447955881183" target="_blank">
    <img src="offstump.jpg" alt="Ad Banner">
  </a>
</div>

<div class="info-card">
  <div class="label">DATE</div>
  <div class="value">28-03-2026</div>
</div>

<div class="info-card">
  <div class="label">MATCH NO.</div>
  <div class="value">1 of 74</div>
</div>

<script>
async function initApp() {
  shaka.polyfill.installAll();
  if (shaka.Player.isBrowserSupported()) {
    initPlayer();
  }
}

async function initPlayer() {
  const video = document.getElementById('video');
  const container = document.querySelector('.shaka-video-container');
  const player = new shaka.Player(video);

  const ui = new shaka.ui.Overlay(player, container, video);

  const streamUrl = "https://a96aivottlinear-a.akamaihd.net/OTTB/iad-nitro/live/clients/dash/enc/kksbtkclxn/out/v1/75ba74c3fa354297aa9327a31dfeb4d5/cenc.mpd";

  player.configure({
    drm: {
      clearKeys: {
        "4a3d50bef26a7b2acebfb719a2d02476": "f94f4e94b57e18e48450231b20222c0c"
      }
    }
  });

  try {
    await player.load(streamUrl);
    console.log("Stream loaded");
  } catch (e) {
    console.error(e);
  }
}

document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
