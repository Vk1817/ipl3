
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#1a0f2e,#05070a);
  font-family:'Poppins',sans-serif;
  color:#fff;
}

.header{
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:#ff4ecd;
  text-shadow:0 0 12px #ff4ecd;
}

.player-card{
  width:92%;
  margin:10px auto;
  padding:10px;
  border-radius:20px;
  background:linear-gradient(145deg,#2a1740,#140b24);
  box-shadow:0 0 25px rgba(255,0,150,0.2);
}

.video{
  width:100%;
  height:200px;
  border-radius:16px;
  overflow:hidden;
  border:2px solid rgba(255,0,150,0.4);
}

.video iframe{
  width:100%;
  height:100%;
  border:none;
}

.live-box{
  margin:12px auto;
  width:90px;
  text-align:center;
  padding:6px;
  border-radius:20px;
  background:rgba(255,0,0,0.15);
  border:1px solid red;
  font-size:12px;
  color:red;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

.match-title{
  text-align:center;
  font-size:20px;
  font-weight:600;
}

.ad-box{
  width:92%;
  margin:20px auto;
  padding:8px;
  border-radius:22px;
  background:linear-gradient(135deg,#ff512f,#dd2476);
  box-shadow:0 0 30px rgba(255,80,120,0.5);
}

.ad-box img{
  width:100%;
  height:150px;
  border-radius:18px;
  object-fit:cover;
}

.info-card{
  width:92%;
  margin:12px auto;
  padding:15px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

.label{
  font-size:12px;
  color:#aaa;
}

.value{
  font-size:16px;
  font-weight:600;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="header">TATA IPL 2026</div>

<div class="player-card">
  <div class="video">
    <iframe src="https://tv4wep.pages.dev/?id=STAR%20SPORTS%202%20HD&name=ayna" allowfullscreen></iframe>
  </div>
</div>

<div class="live-box">● LIVE</div>
<div class="match-title">RCB vs SRH</div>

<div class="ad-box">
  <img src="https://via.placeholder.com/1080x300.png?text=YOUR+AD+BANNER">
</div>

<div class="info-card">
  <div class="label">DATE</div>
  <div class="value">28-03-2026</div>
</div>

<div class="info-card">
  <div class="label">MATCH NO.</div>
  <div class="value">1 of 74</div>
</div>

</body>
</html>
